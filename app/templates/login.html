{% extends "base.html" %} {% block title %}UWAGuessr - Sign In{% endblock %} {%
block body_class %}page-login{% endblock %} {% block content %}
<div class="page-wrap">
  <div class="card-shell">
    <div class="map-panel">
      <svg viewBox="0 0 340 520" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="form-panel">
      <img
        src="{{ url_for('static', filename='images/UWAGuessr-logo.webp') }}"
        alt="UWAGuessr Logo"
        class="brand-logo"
      />
      <div class="brand-sub">Explore UWA</div>

      <div class="alert-area" id="alertArea"></div>

      <form id="loginForm" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="email@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <div class="position-relative">
            <input
              type="password"
              class="form-control pe-5"
              id="password"
              name="password"
              placeholder="•••••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="btn-toggle-password" id="togglePassword" aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16">
                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-signin" id="signinBtn">
          <span class="spinner-border" role="status" aria-hidden="true"></span>
          <span class="btn-label">Sign in</span>
        </button>
      </form>

      <div class="divider">or</div>

      <a href="{{ url_for('signup') }}" class="btn-guest text-decoration-none mb-3">Sign up free</a>

      <button class="btn-guest" id="guestBtn">Continue as guest</button>

      <div class="form-footer mt-4">
        <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
      </div>
    </div>
  </div>
</div>
{% endblock %} {% block scripts %}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}
