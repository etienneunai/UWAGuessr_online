{% extends "base.html" %} {% block title %}UWAGuessr - Sign In{% endblock %} {%
block body_class %}page-login{% endblock %} {% block content %}
<div class="page-wrap">
  <div class="card-shell">
    <div class="map-panel">
      <svg viewBox="0 0 340 520" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="form-panel">
      <img
        src="{{ url_for('static', filename='images/UWAGuessr-logo.png') }}"
        alt="UWAGuessr Logo"
        class="brand-logo"
      />
      <div class="brand-sub">Explore UWA</div>

      <div class="alert-area" id="alertArea"></div>

      <form id="loginForm" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="email@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="•••••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn-signin" id="signinBtn">
          <span class="spinner-border" role="status" aria-hidden="true"></span>
          <span class="btn-label">Sign in</span>
        </button>
      </form>

      <div class="divider">or</div>

      <button class="btn-guest" id="guestBtn">Continue as guest</button>

      <div class="form-footer">
        No account? <a href="{{ url_for('signup') }}">Sign up free</a>
        &nbsp;·&nbsp;
        <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
      </div>
    </div>
  </div>
</div>
{% endblock %} {% block scripts %}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}
