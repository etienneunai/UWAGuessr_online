{% extends "base.html" %} {% block title %}UWAGuessr - Forgot Password{%
endblock %} {% block body_class %}page-login{% endblock %} {% block content %}
<div class="page-wrap">
  <div class="card-shell">
    <div class="map-panel">
      <svg viewBox="0 0 340 520" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="form-panel">
      <img
        src="{{ url_for('static', filename='images/UWAGuessr-logo.webp') }}"
        alt="UWAGuessr Logo"
        class="brand-logo"
      />
      <div class="brand-sub">Explore UWA</div>

      <div class="alert-area" id="alertArea"></div>

      <form id="forgotPasswordForm" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <!-- Step 1: Email -->
        <div class="form-step" id="fp-step-1">
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="email@example.com"
              autocomplete="email"
              required
            />
          </div>
          <button type="button" class="btn-signin" id="fpNextBtn">
            <span
              class="spinner-border"
              role="status"
              aria-hidden="true"
            ></span>
            <span class="btn-label">Next →</span>
          </button>
        </div>

        <!-- Step 2: Security question + new password -->
        <div class="form-step" id="fp-step-2" style="display: none">
          <div class="mb-3">
            <label class="form-label">Security Question</label>
            <p
              id="securityQuestionText"
              class="text-light"
              style="font-size: 0.85rem"
            ></p>
          </div>
          <div class="mb-3">
            <label class="form-label" for="securityAnswer">Answer</label>
            <input
              type="text"
              class="form-control"
              id="securityAnswer"
              name="securityAnswer"
              placeholder="Your answer"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label" for="newPassword">New Password</label>
            <input
              type="password"
              class="form-control"
              id="newPassword"
              name="newPassword"
              placeholder="•••••••••••"
              autocomplete="new-password"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label" for="confirmPassword"
              >Confirm Password</label
            >
            <input
              type="password"
              class="form-control"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="•••••••••••"
              autocomplete="new-password"
              required
            />
          </div>
          <div class="step-nav">
            <button type="button" class="btn-back" id="fpBackBtn">
              ← Back
            </button>
            <button type="submit" class="btn-signin" id="resetBtn">
              <span
                class="spinner-border"
                role="status"
                aria-hidden="true"
              ></span>
              <span class="btn-label">Reset Password</span>
            </button>
          </div>
        </div>
      </form>

      <div class="form-footer">
        Remember your password?
        <a href="{{ url_for('login') }}">Back to login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %} {% block scripts %}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="{{ url_for('static', filename='js/forgot_password.js') }}"></script>
{% endblock %}
